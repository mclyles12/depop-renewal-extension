<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Depop Renewer — Running</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #1a1a1c;
      --border: #2a2a2d;
      --accent: #ff3c5f;
      --accent-dim: rgba(255,60,95,0.15);
      --green: #2ecc71;
      --green-dim: rgba(46,204,113,0.12);
      --text: #f0eff0;
      --muted: #666;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 1.5s infinite;
      flex-shrink: 0;
    }
    .dot.done { background: var(--muted); box-shadow: none; animation: none; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .title {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .progress-section {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-family: var(--mono);
      margin-bottom: 8px;
    }

    .progress-msg { color: var(--text); }
    .progress-pct { color: var(--muted); }

    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .progress-bar.green { background: var(--green); }

    .log-section {
      flex: 1;
      padding: 10px 16px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .log-entry {
      display: flex;
      gap: 8px;
      font-size: 10px;
      font-family: var(--mono);
      line-height: 1.5;
      padding: 2px 0;
    }

    .log-time { color: var(--muted); flex-shrink: 0; }
    .log-msg { color: var(--text); }
    .log-msg.success { color: var(--green); }
    .log-msg.error { color: var(--accent); }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .stop-btn {
      flex: 1;
      background: none;
      border: 1px solid var(--accent);
      border-radius: 5px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      padding: 9px;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .stop-btn:hover { background: var(--accent-dim); }
    .stop-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .close-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      padding: 9px;
      cursor: pointer;
      transition: all 0.15s;
      display: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .close-btn:hover { border-color: var(--text); color: var(--text); }
    .close-btn.visible { display: block; }
  </style>
</head>
<body>

  <div class="header">
    <div class="dot" id="dot"></div>
    <span class="title" id="headerTitle">Renewal Running</span>
  </div>

  <div class="progress-section">
    <div class="progress-top">
      <span class="progress-msg" id="progressMsg">Starting...</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="log-section" id="logSection"></div>

  <div class="footer">
    <button class="stop-btn" id="stopBtn">◼ Stop Renewal</button>
    <button class="close-btn" id="closeBtn">✕ Close</button>
  </div>

  <script src="control.js"></script>
</body>
</html>
